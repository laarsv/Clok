server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API zum Backend durchreichen
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Service Worker darf NIE aus dem Browser-Cache kommen, sonst klebt
    # nach einem Deploy die alte Version. Plus Service-Worker-Allowed,
    # damit der SW Scope "/" hat (auch wenn der Pfad selber /sw.js ist).
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Service-Worker-Allowed "/";
        expires 0;
        try_files $uri =404;
    }

    # PWA-Manifest mit kurzem Cache, damit Updates schnell ankommen.
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        default_type application/manifest+json;
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
